artistBio: |
  Born and raised in CT, childhood trips to NYC exposed Greg Mike Mensching to
  the creative potential of reinventing public spaces through art and design.
  Obsessed with the boundless energy and crisp line work of iconic mid-century
  cartoons, Greg began using the walls on the streets to fuse these two
  passions together. He is known for pieces that incorporate vivid explosions
  of incandescent color filtered through a Surrealist Pop Art perspective.
  Populated by gleefully twisted characters, his world is unsettling,
  mischievous, and uniquely captivating.

