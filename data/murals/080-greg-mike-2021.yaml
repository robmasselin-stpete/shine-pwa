artistBio: |
  Greg Mike is an Atlanta-based artist and designer known for his
  character "Larry Loudmouf" and a hyper-saturated cartoon style that
  lands somewhere between vintage animation and pop surrealism. Beyond
  walls, he runs MADPOP — a line of designer toys and collectibles — and
  has had solo shows at ABV Gallery and painted projects for Moxy Hotels.

  His 2021 SHINE mural on the Goldman Wetzel building is pure Greg Mike —
  a packed crowd of grinning, bug-eyed characters in neon pinks and acid
  greens with "SMILE" running across the center. It's one of those walls
  where the energy is impossible to ignore from the sidewalk.

muralDescription: |
  A massive wall covered edge-to-edge with Greg Mike's signature cartoon
  characters — bug-eyed, grinning figures in electric pinks, greens, and
  yellows. The word "SMILE" runs across the center in bold lettering,
  surrounded by the crowd of manic, playful characters that make the
  building impossible to walk past without looking.

