artistBio: |
  Leo Gomez launched his eponymous studio in St. Petersburg in 2017,
  focusing on hand lettering, sign painting, and large-format murals.
  His client list runs from Disney Springs and the St. Pete/Clearwater
  International Airport to local spots like Green Bench Brewing and
  Tombolo Books.

  His SHINE 2021 piece at Bayfront Health reads "Can't Thank You Enough"
  in flowing gold script across a deep navy blue wall — a tribute to
  healthcare workers painted with the precision and flourish of a
  trained sign painter.

muralDescription: |
  Elegant gold script lettering spelling "Can't Thank You Enough" fills
  the entire wall of a building adjacent to Bayfront Health. The flowing
  cursive letterforms are painted on a rich navy blue background, with
  decorative swashes and flourishes extending from each word. "Leo Gomez
  Studio" is signed in the upper right corner.

