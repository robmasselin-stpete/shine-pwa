artistBio: |
  Aurailieus is an artist and creator based in St. Petersburg, Florida, who
  specializes in colorful, creative and imaginative works that blend the genres
  of fine and urban art. Graffiti and the works of Jean-Michel Basquiat served
  as his inspiration to become an artist but originally, Aurailieus found art
  as an escape from the trials of life. Most known for his little yellow robot,
  “Bob the Robot Prince of Denmark,” Aurailieus creates his own vibrant world
  of artistic wonders—one canvas or mural at a time.

