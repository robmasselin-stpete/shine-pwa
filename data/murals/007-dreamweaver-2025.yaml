artistBio: |
  Taylor "Dreamweaver" Smith is a St. Petersburg-based street artist and
  muralist whose work invokes a sense of reverence for the natural world.
  With a background in fine art, her evolving style integrates expressive
  abstraction and realism to capture the spirit of life through light and
  color — often featuring portraiture, vivid patterns, and striking color
  combinations. She creates murals, canvas works, and live painting
  activations for communities and brands both locally and nationwide. A
  recurring SHINE artist, Dreamweaver painted at the 2022 festival and
  returned for 2025 Origins on the 600 block of Central Avenue, where the
  SHINE movement started in 2012.

muralDescription: |
  A multi-story mural wrapping around a lavender building, featuring a white
  egret with delicate plumage nestled among enormous, lush flower petals in
  deep pinks, corals, oranges, and purples. The bird's long neck rises
  elegantly through the blooms on the left wall, while the right wall
  continues with swirling petals and soft round forms in warm sunset tones.
  The scale is dramatic — the egret spans several stories — and the
  soft-focus, almost photorealistic rendering gives the whole piece a
  dreamlike, ethereal quality.

