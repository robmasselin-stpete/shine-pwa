artistBio: |
  Egypt Hagan, who paints under the name Graffiti Egypt, is an LA-born
  muralist now based in Arizona. She's known for luminous, large-scale
  portraits that use bold color and gold tones to tell stories about
  identity and resilience. Her work has been exhibited internationally
  and featured in publications including the Sun-Sentinel and PRINT
  Magazine.

  Her 2022 SHINE mural on the George F. Young building features two
  faces in profile wreathed in roses, filling the multi-story wall with
  the kind of intimacy that's hard to pull off at that scale. The warm
  palette and painterly brushwork make it feel more like a gallery
  piece than a typical building mural.

muralDescription: |
  Two faces in profile fill the multi-story wall of the George F. Young
  building, surrounded by roses and soft washes of warm color. The
  portraits are rendered with expressive, painterly brushwork — detailed
  enough to read as specific individuals but loose enough to feel like
  fine art rather than photorealism. Roses and floral elements weave
  around and between the two figures.

