artistBio: |
  A Los Angeles born artist, Egypt highlights the use of portraiture as
  storytelling. As each human bears a unique story, she relishes in creating
  these stories using bold images and an underlying vibrancy that emphasizes
  the main subject. Egypt's paintings consist of people and untold stories that
  deserved to be heard. Egypt currently resides and works out of Florida. She
  continues to work on numerous projects and commissions while exhibiting her
  artwork around the world.

