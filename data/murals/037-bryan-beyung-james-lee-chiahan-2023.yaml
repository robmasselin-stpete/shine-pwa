artistBio: |
  Bryan Beyung (王永財) is a Sino-Cambodian visual artist born in Montreal to a
  family of Chinese-Cambodian refugees. He studied graphic design at Cégep
  Marie-Victorin and color theory and muralism at Galería LaRoja in Seville,
  Spain. His work explores immigration, diasporic heritage, and migratory flows,
  blending neo-muralism, post-graffiti, and contemporary painting. Notable
  projects include "The Sea Keeper," the first mural on a Canadian bulk carrier,
  and public works across the US, Canada, Haiti, France, Morocco, and Cambodia.
  James Lee Chiahan (李佳翰, b. 1990) is a Taiwanese-Canadian artist from Tainan,
  Taiwan, now based in Montreal. Largely self-taught in oil painting, he creates
  emotionally resonant work exploring memory, closeness, and distance. His
  editorial illustration clients include The New Yorker, The Atlantic, The
  Washington Post, The New York Times, and Apple. He won the 2024 Canadian
  Magazine Awards Grand Prize for Cover Art. The two share a studio in Montreal.

muralDescription: |
  A two-panel mural on the Stewart Moving & Storage building. The left side
  features a large black circle on a golden background containing a white tree
  silhouette and crescent moon — based on a drawing by six-year-old Amelia Kien
  — with the word "ABSENT" below and colorful childlike figures along the bottom
  painted by the Kien family. The right side shows a photorealistic sunset
  landscape with four family members — two adults and two children — standing on
  a hillside, connected by a red textile panel with traditional patterns. A navy
  blue band along the base depicts fish silhouettes. The mural tells the story
  of the Kien family, who fled Cambodia in 1987 and eventually settled near
  Bradenton, Florida, just minutes from this wall.

