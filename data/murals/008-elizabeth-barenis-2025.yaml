artistBio: |
  Born and raised in Greenville, Mississippi, Elizabeth Barenis has been
  painting since childhood. A graduate of Sarah Lawrence College in New York,
  she was named a 2023 Creative Pinellas Professional Artist grantee and
  participated in the 2018 International Painting Symposium at the Mark
  Rothko Art Center in Latvia. Her signature "Abstract Precisionism" style,
  inspired by her photography, uses softly abstracted shapes and colors to
  evoke tranquility and beauty. Now based in Pinellas County, she believes
  "it's the artist's job to amplify" beauty and that "art for a community
  really uplifts the community." She participated in the 2025 SHINE Origins
  festival.

muralDescription: |
  A wide mural on a cinder block wall depicting oversized tropical fan palm
  fronds in layered shades of green, teal, and soft yellow. The leaves
  radiate outward in clean, geometric planes — Barenis's "Abstract
  Precisionism" style — creating depth through overlapping translucent shapes.
  Signed "Elizabeth Barenis 2025" in the lower left corner.

