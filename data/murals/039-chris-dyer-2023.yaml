artistBio: |
  Chris Dyer (b. 1979) is a Peruvian-Canadian visionary artist now based in
  St. Petersburg/Gulfport, Florida. Born in Ottawa, he grew up in Lima, Peru
  before returning to Canada at 17, eventually studying illustration at Dawson
  College in Montreal. A leading figure of the North American visionary art
  movement, his style fuses psychedelic imagery, Incan and pre-Columbian
  influences, sacred geometry, and 1980s-90s skate culture aesthetics. He has
  painted murals in 44+ countries, including at the Bob Marley Museum in Jamaica,
  the Beatles Ashram in India, and the STRAAT Museum in Amsterdam. He founded the
  Positive Creations brand in 2003 and has published two art books through
  Schiffer and Last Gasp. He teaches workshops at the Montreal Museum of Fine
  Arts, the National Gallery of Canada, and The Chapel of Sacred Mirrors (CoSM).

muralDescription: |
  A panoramic cosmic scene against a starry black background on Stewart Moving &
  Storage. A wildly detailed spaceship made of interlocking creatures, tentacles,
  and geometric patterns blasts across the wall, trailing rainbow exhaust flames
  and lightning bolts. The vessel is piloted by psychedelic characters with
  multiple eyes and Incan-inspired headdresses, one flashing a peace sign from
  inside a blue bubble cockpit. "Positive Creations" floats above in rainbow
  lettering, "PEACE PLEASE" appears in a speech bubble at right, and a smiling
  sun face radiates in the upper right corner. Saturn, UFOs, and alien faces
  orbit the composition. Signed "Chris Dyer" at left and "LOVE!" in pink at
  lower right.

