artistBio: |
  Derek Donnelly is a St. Petersburg native who graduated from Pinellas County
  Center for the Arts at Gibbs High School in 2001, then studied graphic design
  and digital illustration at IADT Tampa. He has been a full-time muralist since
  2010. In 2011 he opened Saint Paint Arts gallery on the 600 block of Central
  Avenue, helping launch several artists' careers before closing in 2014 to
  focus on murals. He later founded COVE gallery in Pinellas Park and Public
  Art Project Inc., a nonprofit promoting public art. His playful, illustration-
  meets-realism style frequently features his son Syre and Florida wildlife.
  Clients include AARP, Hilton Hotels, Tampa Bay Rays, MLB, and Fender Guitars.
  He is a multiple Best of the Bay winner and was selected as inaugural
  Artmaker 2026 artist at Ruth Eckerd Hall. For SHINE 2025 he served as
  Operations Lead and artist liaison.

muralDescription: |
  A whimsical mural on the east wall of the Morean Arts Center depicting
  an anthropomorphic T-Rex dinosaur wearing a brown fedora, round glasses,
  and a blue-and-white Hawaiian shirt, holding a fishing rod over the
  waterfront. A pink-and-blue sunset sky frames a distant city skyline
  across the bay. The mural is part of Donnelly's AARP "Age Friendly St.
  Pete" series — the T-Rex going fishing represents "the older generation
  of St. Pete enjoying life to the fullest." Signed "Donnelly @saintpaintarts."

