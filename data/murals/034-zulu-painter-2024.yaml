artistBio: |
  Zulu Painter (Carlos Culbertson) is a St. Petersburg-based multimedia
  artist whose "Mindful Murals" appear on buildings across the US. His
  practice spans traditional painting, special effects, and scenic art,
  and he's been part of SHINE since 2017 when he painted "Thirst" for
  the festival. His vibrant, community-focused work aims to uplift
  through color and representation.

  The CASA Family Justice Center mural was commissioned by
  philanthropists Willi Rudowsky and Hal Freedman through a
  request-for-proposals process, completed ahead of the center's
  October 2022 grand opening. It spans two buildings on Arlington
  Avenue, two blocks north of Central, and was designed to create a
  welcoming environment for domestic violence survivors arriving at
  the center.

muralDescription: |
  Four diverse faces fill the two-story CASA Family Justice Center
  building, representing different demographics affected by domestic
  violence. On one side, a woman cradles a baby, with words embedded
  in the curls of her hair — "Drive, Bravery, Family, Growth, Hope,
  Empathy, Love, Community, Wisdom, Faith, Create, and Unity." The
  other side depicts a young woman extending a helping hand and a young
  man making direct eye contact. Colorful geometric patterns, blue
  polka dots, swirling vines, and flowers in purples and golds
  surround the figures. A pathway of white polka dots and purple
  triangles crosses Arlington Avenue as part of the design.

muralInspiration: |
  As Zulu Painter described the faces: "They're everyone... people from
  our community who have in some way been affected by family turmoil."

