artistBio: |
  Claudia Walde, known as MadC, is a German graffiti artist and painter with nearly three decades in the game. Nicknamed "The Mad One" for her fearless approach, she's built an international reputation for translating the speed and energy of graffiti calligraphy into large-scale abstract compositions. Her work layers translucent sweeps of color that overlap and glow where they intersect — part street art, part color-field painting. She works on both massive outdoor walls and studio canvases.

muralDescription: |
  A multi-story abstract mural on the side of an apartment building. Sweeping translucent ribbons of hot pink, cyan, orange, and white crisscross at sharp angles over a vivid yellow background. Where the color bands overlap they create new hues — purple where pink meets blue, warm peach where orange meets white. The effect is like looking through stacked sheets of colored glass. White paint splatter near the top right adds a calligraphic flourish.

