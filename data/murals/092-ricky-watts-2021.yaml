artistBio: |
  Born 1980 in San Francisco, CA, Richard "Ricky" Watts is most notably
  recognized for his abstract works of fluid shapes and psychedelic color
  patterns. Watts’ self-taught techniques derive from his younger graffiti
  years in Northern California. A versatile artist with range across multiple
  mediums, Ricky’s large-scale murals and intricate paintings on canvas can be
  found throughout the US. His commissions list includes work for well-known
  technology, fashion and automotive companies.

