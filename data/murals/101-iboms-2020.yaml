artistBio: |
  Jabari Reed-Diop, otherwise known as iBOMS is a 21-year-old artist based in
  St. Petersburg, Florida. His artistic acumen comes from personal experience
  and formal education at Douglas Anderson School of the Arts in Jacksonville.
  Despite constantly pushing his craft and experimenting with new mediums,
  iBOMS’ style is immediately recognizable. At first glance, his work may seem
  like simple illustrations or even graffiti, but each piece has a story to
  tell, a deeper message, a powerful statement about love, destruction, or
  discovery. His characters are complex and often represent aspects of his life
  as a young black male.

