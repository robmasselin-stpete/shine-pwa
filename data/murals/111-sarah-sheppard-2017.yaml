artistBio: |
  Sarah Sheppard is an experienced painter, muralist, designer, and metalsmith
  based in St. Petersburg, Florida. She draws inspiration from the people and
  places she has encountered around the world, aiming to convey beauty,
  romanticism, and mysticism in every medium. She also participated in SHINE
  2023 with a mural at New Dawn Coffee Co.

muralDescription: |
  A mural on the back wall of the Morean Arts Center framed with a navy blue
  border and ornate gold trim, giving it the appearance of a steampunk painting.
  At center, a woman merges with a banyan tree — her body becoming the trunk,
  her roots spreading into the ground. She reaches out to a red phoenix bird
  at left, symbolizing rebirth. The right side features massive interlocking
  bronze and gold gears representing the passage of time and the mechanics of
  working life. Teal water fills the base. Commissioned by AARP as part of the
  "Age Friendly St. Pete" SHINE All Year program in 2017.

