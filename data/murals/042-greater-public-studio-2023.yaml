artistBio: |
  Greater Public Studio is a Tampa-based creative team that designs
  large-scale murals and visual environments. Founded with a focus on
  making public spaces more engaging, GPS has taken on projects ranging
  from building-sized paintings to immersive installations across Florida
  and beyond.

  Their 2023 SHINE piece at the USF St. Pete campus brought a burst of
  color to the university district with "Dive Into Discovery," a vibrant
  scene depicting an imaginative community landscape full of whimsical
  architectural forms and figures.

muralDescription: |
  A colorful, illustrative mural spanning a large wall near the USF St.
  Pete campus. The composition features a fantastical townscape with
  stacked buildings, winding paths, and small figures exploring the scene.
  Bright blues, oranges, and greens fill the design in a style that feels
  like an oversized storybook illustration.

