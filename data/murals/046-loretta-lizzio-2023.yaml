artistBio: |
  Loretta Lizzio (b. 1986) is a Greek-Australian painter, photographer, and
  muralist based in Melbourne. She honed her artistic sensitivity through
  professional experience in publishing, photography, and advertising before
  dedicating herself full-time to fine art and murals. Her ethereal works layer
  oil, acrylic, resin, gold leaf, and intricate line work to explore themes of
  Greek mythology, romanticism, nature, and the female figure. She is the first
  female artist commissioned for the Hellenic Museum's Dialogue Series, creating
  "Well Behaved Women" — a three-part mural of fearless women from ancient Greek
  history. Her work has appeared at the Brisbane Street Art Festival, Vancouver
  Mural Festival, and Wall to Wall Festival, and in galleries including Haven,
  Nucleus, Beinart, and Outre. She has collaborated commercially with New
  Balance, Wacom, and Toyota.

muralDescription: |
  A wide mural on the Stewart Moving & Storage building depicting three women
  as sirens from Greek mythology against a deep teal-green background. The
  figures emerge from lush green foliage, their pale skin overlaid with
  intricate leaf patterns and delicate line work that makes them appear to grow
  from the plants themselves. Their dark hair flows and intertwines across the
  top of the composition, creating a canopy effect. The sirens gaze outward
  with serene yet subtly unsettling expressions — beautiful and sinister at
  once. Signed "Loretta Lizzio" in the upper right corner.

