artistBio: |
  From Cali, Colombia, Gleo's work moves in different formats—murals, canvases,
  serigraphs—but they maintain a common language: color and shapes, elements
  that in turn create dialogue with the spaces built by the human imaginary.
  Gleo proposes to understand her work as part of us, since it starts from the
  premise that we all form one with nature. She is in search of a sensorial and
  universal language in which her work would be a turning point within the
  spaces we normally inhabit—a bridge to an experience of inner contemplation.

