artistBio: |
  Dwayne Shepherd is a visual arts teacher at Osceola Middle School in Seminole,
  FL, where he has taught for over 22 years and founded a mural club that
  transformed campus walls with student-painted murals. A graduate of Austin Peay
  State University, he was named Florida Art Teacher of the Year in 2015 and has
  been a Pinellas County Teacher of the Year finalist three times. Brian
  McAllister is an international muralist, illustrator, and visual arts
  instructor at the Pinellas County Center for the Arts at Gibbs High School. A
  Ringling College of Art and Design graduate, he founded the Gibbs Mural Club,
  a 13-year community outreach program with 36 students creating professional
  public art. His SHINE credits include the 133-foot "Great Futures Start Here"
  mural on the historic Royal Theater in 2019. Together, Shepherd and McAllister
  collaborate with art educators statewide through the Florida Art Education
  Association (FAEA).

muralDescription: |
  A vibrant marine-themed mural on the side of Bell Pharmacy celebrating art
  education. The composition centers on an underwater scene with sea turtles
  swimming among mangrove roots, tropical fish, and coral. Dolphins arc through
  the water above while the text "The Importance of ART Education" anchors the
  design. The mural was painted collaboratively with art educators from across
  Florida during the FAEA annual conference in October 2024 as one of four
  "Bright Spots" community murals in SHINE's 10th anniversary festival.

