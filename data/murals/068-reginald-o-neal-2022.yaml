artistBio: |
  Reginald O'Neal is a Miami-born painter who grew up in Overtown and
  trained under mentor Alejandro Dorda. His work has been acquired by
  Perez Art Museum Miami and ICA Miami, he's represented by Vielmetter
  Los Angeles gallery, and he was named to the Artsy Vanguard in 2021.
  He's completed murals in Austria, Norway, Spain, and the Dominican
  Republic.

  His SHINE 2022 mural on the USF Piano Man Building is a monochromatic
  composition depicting historian John Henrik Clarke in a suit alongside
  scenes of the Mundari tribe of South Sudan — figures with long-horned
  cattle and a fisherman working nets. The entire piece is rendered in
  blacks, whites, and warm sepia tones with classical oil-painting
  technique.

muralDescription: |
  A sweeping black-and-white mural spanning the full wall. A suited man
  — historian John Henrik Clarke — sits as the central figure, painted
  with photorealistic precision. Behind him, silhouetted scenes show
  Mundari tribespeople tending long-horned cattle and casting fishing
  nets. The monochromatic palette and classical brushwork give the piece
  the weight of a museum painting at building scale.

