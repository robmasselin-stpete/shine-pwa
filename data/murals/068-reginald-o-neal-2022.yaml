artistBio: |
  Reginald O’Neal began painting in 2012, soon meeting his friend and mentor,
  Alejandro Dorda, who would teach him classically. In 2014, Reginald took his
  first trip to Europe to complete murals in Austria, Norway, and Spain, as
  well as exhibit in a collective show alongside his teacher in Berlin,
  Germany. In the years since, Reggie has focused on canvas work, residencies,
  and murals that embody his community surroundings, experiences and beliefs.

