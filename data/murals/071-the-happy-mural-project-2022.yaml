artistBio: |
  St. Petersburg-based artist, Alyssa Marie has been playing in the realms of
  impressionistic style fine art and large scale murals for commercial and
  residential clients around the globe since 2017. Having spent her first 27
  years of life in the Rocky Mountains of Colorado and now residing in a
  tropical paradise surrounded by water, Alyssa derives inspiration from the
  natural world for much of her work and pushes the realms of realism by
  playfully altering what is expected of traditional wildlife and nature scenes
  through her art.

