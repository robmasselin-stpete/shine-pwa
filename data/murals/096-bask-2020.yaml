artistBio: |
  Fleeing communist Czechoslovakia as a young child and growing up under the
  hot Florida sun, Ales Bask Hostomsky took an early interest in graffiti art.
  Now a prolific artist with work in galleries across the country, BASK's art
  covers walls from Detroit to Brooklyn to St. Petersburg, and can be seen in
  the movie Iron Man 3. With no formal arts education, BASK built a career by
  leaning into his mistakes, harnessing each drop of paint, accidental or not,
  as a form of artistic risk-taking.

