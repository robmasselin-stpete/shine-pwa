artistBio: |
  Quinn Cale is a contemporary painter based in Tampa, Florida. Originally from
  Middletown, Delaware, her colorful works draw on childhood memories and the
  vibrant spirit of the late 1990s and early 2000s. Through bold compositions
  and nostalgic imagery—arcade machines, tropical motifs, instruments, and
  TV-headed figures—she evokes joy and storytelling. Her work has been
  exhibited at MOSI in Tampa and the Straz Center’s “First Annual Black Art
  Gala.”

