artistBio: |
  Based in St. Petersburg, FL, Jenipher Chandley is a representational artist
  whose work explores the relationship between nature and the human condition,
  focusing on themes of strength, beauty, loss, pain, and ultimately,
  resilience. Jenipher holds degrees in Interior and Graphic Design and has
  shown her work in hundreds of shows and charitable events, while curating
  exhibitions throughout the Tampa Bay area and supporting fellow artists
  through teaching and mentorship.

