artistBio: |
  John Vitale, co-founder of the iconic Vitale Brothers, is a veteran
  muralist and creative force behind much of St. Petersburg's visual identity.
  Since 1992, the Vitale Bros have painted walls throughout Tampa Bay,
  playing a major role in establishing St. Petersburg as a world-class arts
  destination. John is also the founder of Overspray Art Space in Gulfport,
  where he fosters community through spray paint workshops and live art
  events. For this mural at The Factory, Vitale collaborated with Sionna
  "Sio" MacLeish, a Florida-based muralist and artist known for her
  versatility across styles. MacLeish painted the roseate spoonbill panel,
  while Vitale handled the vintage pin-up and Thunderbird motel scene.

muralDescription: |
  A multi-panel vintage Florida postcard mural inside The Factory. The left
  panel features a glamorous 1950s-style pin-up woman with black hair and a
  pink hibiscus, turquoise jewelry, and a leopard-print top, set against the
  Thunderbird motel sign framed by tropical hibiscus flowers. Below reads
  "St. Petersburg, Florida" in retro blue script on golden yellow. The right
  panel, painted by Sionna MacLeish, shows a roseate spoonbill in soft pinks
  against a pale blue polka-dot background with a bold orange sun. The whole
  composition evokes mid-century Florida tourism nostalgia.

