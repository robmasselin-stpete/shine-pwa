artistBio: |
  123Klan is a French graffiti crew, composed of husband and wife team Scien
  and Klor, who have dominated the street art scene for more than 25 years. By
  shifting the boundaries of their two favorite disciplines, graffiti art and
  graphic design, 123KLAN have advanced the graffiti aesthetics and infused a
  healthy dose of new ideas into current graphic design. Now living in Los
  Angeles, 123Klan’s bold character design and iconography has helped them
  establish a client list from Sony to Scion to KidRobot, while holding true to
  their graffiti roots.

