artistBio: |
  Chad Mize is a multimedia artist often called "St. Pete's Godfather of Art."
  He founded MIZE Gallery (formerly Bluelucy Gallery) and was a member of
  SHINE's organizing committee. He has been painting Twiggy — the 1960s fashion
  icon — since 2003, citing her androgynous style, 60s aesthetic, and striking
  eyes as inspiration. This mural, painted circa 2014, is considered one of the
  pioneering murals that helped establish the 600 block of Central Avenue as an
  arts destination, predating the first SHINE festival in 2015.

muralDescription: |
  A stencilled black-and-white mural of 1960s fashion icon Twiggy's face in
  the alley behind the 600 block of Central Avenue. The image references the
  iconic 1966 photograph by Barry Lategan, showing Twiggy's signature doe eyes
  with stars, rendered with an iridescent sheen against a faded light blue wall.
  The deliberately muted, pastel-hued palette contrasts with the bolder murals
  in the surrounding area.

