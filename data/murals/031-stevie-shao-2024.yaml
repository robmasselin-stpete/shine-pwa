artistBio: |
  Stevie Shao is a second-generation Chinese-American illustrator and muralist
  born and raised in Seattle. She studied interior design at Seattle Pacific
  University, where an illustration course with Rachell Sumpter sparked her
  artistic path. After being laid off during COVID-19 in 2020, she transitioned
  to full-time art, quickly becoming one of Seattle's most in-demand public
  artists. Her style blends folk art, Chinese ceramics, and traditional American
  tattoo influences into ornate, maximalist compositions filled with plants,
  animals, and mythical creatures. Clients include Starbucks, REI, Google,
  Nordstrom, Sub Pop Records, and the Seattle Kraken, for whom she designed the
  2022 Women in Hockey jersey. Fashion designer Anna Sui featured her work in
  her Spring/Summer 2021 collection. She was named one of Seattle Magazine's
  "25 Most Influential" in 2023.

muralDescription: |
  A multi-story mural on the side of the Volunteers of America building
  depicting a sinuous, serpentine dragon in bold navy blue, red, gold, and
  turquoise against a white background. The dragon coils upward across the
  full height of the building, its body decorated with pink scalloped scales
  and chartreuse dots. Two stylized birds with spread wings — one near the top
  and one at the bottom — intertwine with the dragon's twisting form. Blue
  flames curl from the dragon's mouth. The flat, graphic style draws on Chinese
  folk art and traditional tattoo aesthetics. Signed "Stevie Shao 24" in the
  lower right corner.

