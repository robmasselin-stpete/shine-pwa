artistBio: |
  Ya La'Ford is a Florida-based multidisciplinary artist whose geometric
  murals and installations explore cultural heritage and collective memory.
  Her vibrant, pattern-heavy work has landed commissions with Nike, the
  NBA, and a project honoring Maya Angelou, and she maintains an active
  mural map documenting her public pieces across the state.

  Her SHINE 2021 mural on the Smith & Associates building along Beach
  Drive features a glowing orange heart rendered in warm gradients with
  radiating lines, turning the real estate office facade into one of the
  more eye-catching walls on the downtown waterfront strip.

muralDescription: |
  A large orange heart dominates the wall of the Smith & Associates
  building, rendered in warm gradients with radiating lines that give it
  a glowing, luminous quality. The heart shape is built from layered
  brushwork, creating a textured surface that reads differently up close
  versus from across Beach Drive.

