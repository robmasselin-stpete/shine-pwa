artistBio: |
  Chris Roberts, known as BRAIN The Genius (formerly Brain Storm), is a
  St. Petersburg multidisciplinary artist, tattoo artist, and entrepreneur.
  He has spent over two decades building Urban Ink Tattoo Company into one of
  the city's most respected studios, recognized as one of the rare Black-owned
  businesses in the body art community. Beyond tattooing, he is an accomplished
  painter, designer, and cinematographer who founded Culture Creative, a
  dynamic art and event space on 34th Street South that amplifies local talent.
  He painted a SHINE Bright Spot mural in 2020 at the St. Pete Youth Farm and
  returned for the 2025 SHINE Origins festival.

muralDescription: |
  A bold mural on a cinder block wall featuring the word "Culture" in ornate
  gold script, framed by oversized gold bamboo hoop earrings and topped with a
  gold crown. Lush monstera leaves fill the background in deep greens against
  black. The left side reads "Bamboo Earrings At Least Two Pair" in white
  graffiti-style lettering — a nod to the LL Cool J lyric. Signed "BRAIN
  @brainthegenius" in the lower right.

