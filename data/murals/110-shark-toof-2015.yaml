artistBio: |
  Shark Toof (David Lew) is an American graffiti artist, stencillist, and
  muralist based in Los Angeles. He started painting graffiti in 1985 and is a
  graduate of ArtCenter College of Design in Pasadena. He is best known for his
  wheat-pasted images of a hand-drawn, gape-mouthed great white shark, which he
  uses as a symbol of "strength, optimism, and possibility." His work has been
  commissioned by Ritz Carlton, Samsung, Apple, Hurley, Burton, and Heineken.

muralDescription: |
  A massive great white shark painted in dark gray and black across the east
  wall of the State Theater, a pink/coral building with arched windows on
  Central Avenue. The shark's head dives downward with its mouth wide open,
  baring rows of white teeth, positioned above a red metal-grate door. The
  piece was completed over four days using approximately 100 cans of aerosol
  paint on the 55-by-33-foot wall. The shark's menacing form contrasts with
  the ornate architectural details of the historic theater building.

