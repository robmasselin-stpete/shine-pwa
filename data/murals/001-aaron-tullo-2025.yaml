artistBio: |
  Aaron Tullo is a St. Petersburg-based muralist, sign painter, and fine artist
  who operates under the Aaron James Tullo Fine Art studio. His work blends
  figurative realism with bold graphic design, drawing on his background in both
  traditional painting and commercial art — including work for clients such as
  St. Pete College, Penn Fishing Reels, and Old Northeast Jewelers. A former
  minor league baseball player, Tullo channels his travels and community
  connections into story-driven public art that celebrates place and people.
  He participated in the 2025 SHINE Origins festival, painting a five-story mural
  on the Cordova Inn, the festival's title sponsor.

muralDescription: |
  This five-story mural on the facade of the Cordova Inn depicts a large white
  peacock rendered in Tullo's characteristic blend of figurative realism and bold
  graphic composition. The bird's plumage fills the building's vertical expanse,
  creating a striking visual landmark in downtown St. Petersburg.

