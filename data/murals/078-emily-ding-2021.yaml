artistBio: |
  Emily Ding is a Houston-based muralist known for large-scale paintings
  of animals rendered with a classicist's attention to fur and feather
  and a surrealist's sense of composition. She's painted walls across
  the US — Sacramento, Oakland, DC, Salt Lake City, Flint — and
  internationally in China, and was featured in Houston's Mini Murals
  project and Michigan's Bright Walls festival.

  Her SHINE 2021 mural at Rob Graham Enterprise features a sleeping fawn
  curled up among white blossoms, painted in rich naturalistic detail
  against a deep forest-green background. The piece has a quiet
  tenderness to it, with the young deer nestled into roots and foliage
  as if the building wall were a woodland floor.

muralDescription: |
  A young fawn sleeps curled in a gentle pose, its spotted fur rendered
  with painterly realism. White flowers bloom from the deer's back and
  around its body, growing up toward a window that's incorporated into
  the design. The deep emerald-green background gives the whole wall
  the feeling of a forest clearing. Emily Ding's signature is visible
  in the lower right.

