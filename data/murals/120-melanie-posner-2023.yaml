artistBio: |
  Melanie Posner is an LA-based muralist originally from Pennsylvania
  who earned her BFA from the University of Tampa. She's known for
  vibrant, photorealistic portraits of women, and her client list
  includes Walt Disney World, Amazon Prime, and TikTok — for whom she
  painted a 40-foot mural in the heart of Hollywood.

  Her 2023 St. Pete mural features a woman's face in oversized
  reflective sunglasses with bright pink lips, set against a playful
  background of colorful polka dots on teal. The sunglasses reflect
  what appears to be the St. Pete waterfront, tying the portrait to
  its location.

muralDescription: |
  A photorealistic woman's face fills the wall, wearing large reflective
  sunglasses that mirror a waterfront skyline scene. Bright pink lips
  and warm skin tones contrast with the cool teal background, which is
  dotted with oversized polka dots in pink, gold, red, and light blue.
  The piece wraps around windows that are incorporated into the design.
  Palm trees frame the mural on either side.

