artistBio: |
  Chenlin Cai (蔡陈林, b. 1984) is a Chinese-American visual artist based in
  Philadelphia. Born in a fishing village in Fujian province, China, he holds
  MFAs from both Tsinghua University in Beijing and the Pennsylvania Academy of
  the Fine Arts (PAFA). He immigrated to the US in 2014. His work innovatively
  combines traditional Chinese ink painting with contemporary Western oil
  painting techniques, exploring the tension of navigating Eastern and Western
  cultures. Major commissions include "The Past Supporting the Future," a
  54-foot crane mural on the Crane Community Center in Philadelphia's Chinatown
  created with Mural Arts Philadelphia, and an installation at Philadelphia
  International Airport. He received the "Excellent Artist Award" at the Eye Art
  2017 exhibition at United Nations Headquarters and the Coverly Smith Prize at
  Woodmere Art Museum. He served as Commissioner on the Pennsylvania Governor's
  Advisory Commission on Asian Pacific American Affairs (2022-2023).

muralDescription: |
  A wide mural on the Lantmännen Unibake building depicting three Chinese
  American railroad laborers rendered in blue-gray tones against a dramatic
  sunset of deep orange, gold, and purple. The three figures — one holding a
  staff, one reading a letter, one planting a flower with his hat removed —
  represent family longing, hope, and resilience. Behind them, golden mountain
  peaks evoke the Sierra Nevada, with a setting sun and crescent moon
  embodying the duality of aspiration and homesickness. A steam locomotive
  and train cars wind along railroad tracks at right. The mural reimagines
  Chinese laborers who built the First Transcontinental Railroad but were
  excluded from its 1869 completion photographs. Created in partnership with
  the James Museum's "From Far East to West" exhibition.

