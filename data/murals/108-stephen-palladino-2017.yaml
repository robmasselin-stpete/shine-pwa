artistBio: |
  Stephen Palladino (b. 1986, Bronx, NY) is a globally recognized artist whose
  style merges street culture, fine art, and raw emotional storytelling. His
  father was a carpenter and pinstriper, his mother brought Sicilian heritage.
  By age 10 his talent earned him a spot in a magnet art program for formal
  classical training, but his true education came painting large-scale murals
  throughout New York City as a teenager. He left high school to pursue painting
  full-time. His signature distorted characters blend graffiti, cartoons, and
  German Expressionism into work that is "slick and gritty, dark and lowbrow."
  Collaborations include Lady Gaga, Tiffany & Co., Playboy, Absolut Vodka,
  Reebok, American Express, Capital One, and Hilton. He won First Place in
  Painting at the Beverly Hills artSHOW in 2016. Also known as "Good and
  Shiddy."

muralDescription: |
  A 17-by-95-foot mural on the south wall of Benson Worley Architecture
  featuring a dense composition of distorted human figures and faces in bright
  fluorescent colors — aqua, orange, lime green, purple, blue, and rosy red.
  From a distance the forms read as a cheery abstract puzzle, but up close bold
  black line drawings reveal Palladino's expressive, German Expressionism-
  influenced style. Characters include an orange woman, a blue-suited man, and
  a red woman in profile, interspersed with phrases like "LOVE ME," "AIN'T,"
  "NOBODY but YOU," "LOOKIN NEAT," "GAS," "YO!," and "NOT TRUE" scrawled in
  handwritten text across the wall.

