artistBio: |
  Rebekah Eugenia Lazaridis is a St. Pete native and multidisciplinary artist
  who graduated with a BFA from The School of the Art Institute of Chicago in
  2005. A scenic artist and designer, she has created sets for productions at
  American Stage, Jobsite, freeFall, and Stageworks. She also runs
  @homeillustrations, creating customized home portraits with a nostalgic
  flair, and her CIRCA series portrays iconic St. Petersburg spots in a
  vintage postcard style. Her first NYC solo show explored theatrical
  superstitions. She participated in SHINE 2025 Origins at 31st St & 7th
  Ave S.

muralDescription: |
  A dramatic monochromatic mural on a black cinder block wall. A large
  ornate Gothic letter "B" with intricate Celtic knotwork fills the center,
  overlaid on a detailed full moon rendered in grays and whites. Bats swarm
  from the left across the night sky, and a barn owl with outstretched wings
  emerges from storm clouds on the right, with rain streaking diagonally
  downward. Signed "ReAh @rebekahlaz" in the lower right corner. The entire
  palette is black, white, and silver — a stark contrast to the colorful
  murals flanking it.

