artistBio: |
  Quinn Cale is a Tampa-based painter originally from Delaware whose work
  channels early-2000s childhood nostalgia into bold, colorful
  compositions. She previously worked at Apple, an experience that led
  her to experiment with augmented reality overlays on her paintings
  using Adobe Aero — viewers can point an iPad at the canvas and see
  digital elements come to life.

  Her SHINE 2024 mural at Main Grove features a multicolored cat in
  vivid neon hues pouncing toward a pixelated mouse cursor and a
  retro-styled pixel hand pointer. The gaming references and rainbow
  palette are pure Cale — pop culture nostalgia meets street art energy.

muralDescription: |
  A large cat rendered in electric purples, teals, oranges, and pinks
  leaps across the wall, chasing a pixelated orange mouse and a retro
  cursor hand icon. The cat's fur is broken into bold color blocks that
  read like a neon stained-glass window. The whole piece pops against
  a dark teal and sage background.

