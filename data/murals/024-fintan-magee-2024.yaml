artistBio: |
  Fintan Magee is an Australian muralist based in Sydney, known for
  large-scale social realist paintings that tackle environmental themes
  — water, endangered species, the refugee crisis. He holds a BFA from
  Griffith University and started as a graffiti writer before shifting
  to figurative public art. His walls appear in cities from London and
  Vienna to Buenos Aires and Kyiv, and he's shown at Nuart Festival in
  Stavanger and Aberdeen.

  His SHINE 2024 mural spans four stories of the Reflection St. Pete
  apartment building, depicting an underwater scene in cool blues and
  teals — a submerged figure, a glass bottle, crystal formations, and
  a pineapple, all rendered with photorealistic precision. The piece
  plays on the water and submersion themes that run through much of
  Magee's environmental work.

muralDescription: |
  A four-story mural in shades of blue and teal covers the face of the
  Reflection St. Pete building. The scene depicts objects and a figure
  submerged underwater — a glass perfume-style bottle, crystalline
  formations, and a pineapple float in rippling blue water. The
  photorealistic rendering captures light refracting through the water
  surface above. The building's "REFLECTION" signage sits just below
  the mural's lower edge.

