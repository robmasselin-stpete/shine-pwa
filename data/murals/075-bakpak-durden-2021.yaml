artistBio: |
  Bakpak Durden is a self-taught Detroit artist working across oil,
  acrylic, graphite, and photography. Their hyperrealistic work fuses
  Baroque and Afro-Surrealist influences, and they've shown at Cranbrook
  Art Museum's inaugural Fresh Paint series, Paradigm Gallery in
  Philadelphia, and Muskegon Museum of Art. They received the Torch of
  Wisdom Foundation Cultural Arts Rising Star award in 2024.

  The SHINE 2021 mural on The Bends is a dark, dramatic vanitas piece —
  a human jaw and skull emerge from swirling dark greens and blacks,
  with the text "TELL ME HOW YOU FEEL" visible in the upper corner. The
  entire wall reads like something out of a Baroque gallery, not on the
  side of a bar.

muralDescription: |
  A dark, moody mural stretches across the long wall of The Bends. On
  a near-black background, a skull and exposed jawbone with visible
  teeth emerge from tangled, organic forms in deep greens and grays.
  The text "TELL ME HOW YOU FEEL" appears in the upper right corner.
  The hyperrealistic rendering and somber palette give it the gravity
  of a classical vanitas painting at massive scale.

