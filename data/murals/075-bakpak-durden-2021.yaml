artistBio: |
  Bakpak Durden, born and raised in Detroit, is a self-taught interdisciplinary
  fine artist. Pulling from various figurative art techniques, Durden employs a
  wide range of mediums—oil and acrylic paint, graphite, and fine art
  photography—to construct their hyperrealistic and conceptual works of art.
  Durden’s artworks illuminate the complexity and precarity of human emotion
  and identity by meticulously examining their own.

