artistBio: |
  NeSpoon (Elzbieta Dymna) is a Polish street artist based in Warsaw whose
  signature medium is lace — traditional textile patterns rendered at monumental
  scale on building facades and pressed into ceramic pieces installed on streets.
  Her artist name comes from the famous line in The Matrix. She began her street
  art career in 2009 after discovering that pressing lace into clay was a
  traditional decorative technique, and has since created work in over 100 cities
  across 40 countries on five continents. At each location she researches local
  lace-making traditions through museums and community conversations. Her work
  has appeared at the Louvre-Lens, EXPO Dubai 2020, the European Parliament in
  Brussels, and the Urban Nation Biennale in Berlin. She won the ARTAQ Prize in
  France in 2011 and 2012 and was selected for Urban Nation's Fresh A.I.R.
  residency in Berlin in 2018.

muralDescription: |
  A wide mural on the Cemex building featuring NeSpoon's signature lace patterns
  in white and pale blue against a deep plum-purple background. Intricate
  medallions with floral and geometric motifs occupy the left and center, their
  delicate threadwork rendered with illusory three-dimensional depth through
  careful shading and layering. The right side transitions into flowing,
  organic swirls that evoke wind or waves. The effect transforms the industrial
  concrete wall into what appears to be an enormous draped lace textile. Signed
  "NeSpoon" in the lower left corner.

