artistBio: |
  Aaron "Woes" Martin is an LA-based multidisciplinary artist known for his signature angry-eyed panda bears — part menacing, part adorable. Originally a graffiti writer, he evolved into aerosol muralism, acrylic painting, designer toys, and resin sculpture, bringing his snarling pandas to walls and galleries across the globe. He's also a DJ and puppeteer. Despite the ferocious faces in his work, Woes brings a laid-back aloha energy to everything he does.

muralDescription: |
  A long warehouse wall covered in a pack of oversized panda bears piled on top of each other against a black background. The pandas are rendered in gritty black and white with exaggerated features — bloodshot pink eyes, bared fangs, and massive claws. Some snarl at the viewer while others sleep with one eye cracked open. Bright green bamboo leaves poke through the tangle of fur and limbs. The scale is enormous — each panda is taller than a parked truck.

