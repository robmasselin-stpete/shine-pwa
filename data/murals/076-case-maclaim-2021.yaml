artistBio: |
  German artist Andres Von Chrzanowski, better known as Case Maclaim, is a
  street artist whose work brilliantly combines photorealism with a strong note
  of surrealism. Best known for his depiction of overlaying hands, Case’s work
  symbolizes power and unity. He is a founding member of the renowned Maclaim
  Crew, a group that has been pioneering photorealism in the streets for over
  two decades. His murals can be found in over 20 countries around the world.

