artistBio: |
  Nneka Jones is a contemporary multidisciplinary artist who enjoys working in
  mixed media, embroidery, textiles and paint exploring both large-scale mural
  work and small-scale, intimate pieces. The Trinidadian born artist produces
  thought-provoking artwork that comments on social and environmental
  injustice; strongly advocating for the protection of women and girls of
  color. These are often topics that as a society, we feel uncomfortable
  addressing but are necessary for positive change.

