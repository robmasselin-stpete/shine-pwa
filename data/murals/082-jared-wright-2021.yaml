artistBio: |
  Jared Wright is a Tampa Bay painter and illustrator whose style lands
  somewhere between Dali and an illustrated storybook. His SHINE 2021
  mural on Colony Grill was his first-ever wall piece, and he was later
  selected for the 2024 Tampa Bay Rays Artist Series with work displayed
  inside Tropicana Field.

  The Colony Grill mural, titled "Harmony," features a dreamlike
  composition of an owl, a serpentine creature, and flowing organic
  forms in muted corals, sage greens, and teals. A moon floats among
  the intertwined figures, creating the kind of surreal, gently weird
  scene Wright is known for.

muralDescription: |
  A surreal scene fills the Colony Grill wall with smooth, rounded
  organic forms in muted corals, sage, and teal. An owl with large
  dark eyes perches near a crescent moon while a snake-like creature
  winds through the composition. Leaf shapes, clouds, and celestial
  elements float through the scene, all rendered in soft, flat color
  fields with clean outlines.

