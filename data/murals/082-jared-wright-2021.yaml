artistBio: |
  Jared Wright is a prolific painter and illustrator based in Tampa Bay, FL. He
  uses a variety of styles, techniques, and mediums to create fun, surreal
  worlds with loose narratives. Inspired by everything from Dali and classic
  rock to aliens and the beauty of mother nature, his goal is to create art
  that inspires the viewer to feel, think, and hopefully create or simply share
  the source of inspiration with others. He believes artists should aim to
  represent themselves genuinely and honestly so the viewer can relate to it
  genuinely, and that connection can be everything.

