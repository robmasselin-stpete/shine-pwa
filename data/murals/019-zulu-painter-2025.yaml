artistBio: |
  Carlos Culbertson, known as Zulu Painter, is a St. Petersburg-based
  multimedia artist who works in traditional mediums, body paint, special
  effects, and scenic art. His motto — "I want to grow Art everywhere" —
  drives him as he creates "Mindful Murals" across the country. He has
  worked as a scenic artist for The Science Channel, Disney on Ice, Home
  Shopping Network, Sea World, and national ad campaigns, and served as a
  Representative Artist for Visit Florida. A SHINE veteran since 2016, his
  murals are especially prominent in the Deuces neighborhood, including
  "Moonbeam Dreams" and "Wisdom, Growth, Progress." He returned for SHINE
  2017, 2018, 2024, and 2025 Origins.

muralDescription: |
  A vibrant mural on a cinder block wall blending multiple styles. The left
  side features a photorealistic portrait of a young Black woman in profile
  against a houndstooth pattern with a boombox rendered in grayscale. The
  center and right side shift to a cartoon aesthetic — a wild-eyed character
  with a mischievous grin faces off against a massive green alligator with
  bared teeth, set against a turquoise geometric diamond pattern and black-
  and-white checkerboard. Colorful polka dots in orange, pink, and yellow
  punctuate the composition. Signed "zulupainter.com" in the lower right.

