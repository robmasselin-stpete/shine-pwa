artistBio: |
  Imagine is a Kathmandu-born artist who fuses Sanskrit calligraphy with graffiti energy. Her large-scale murals turn ancient Nepalese script into repeating visual mantras — bold, rhythmic compositions that read as both sacred text and abstract pattern. She works across painting, sculpture, and public walls internationally.

muralDescription: |
  A long parking-lot wall painted solid hot pink, covered with repeating columns of gold Sanskrit-inspired calligraphy. The metallic gold letterforms cascade downward in ornate clusters, with subtler red and pink swirls layered underneath. The effect is meditative and hypnotic — the same sacred text echoing across the entire wall like a visual chant.

