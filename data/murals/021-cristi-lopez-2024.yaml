artistBio: |
  Cristi López (b. 1993) is an artist and mental health advocate splitting time
  between Tampa Bay and Chicago. She graduated from Ringling College of Art and
  Design in 2016 with a BFA in Illustration. Her work explores mental health,
  latinidad, and femininity. Through her intensely personal imagery, she hopes
  that others will recognize themselves. To be portrayed is to be seen.

