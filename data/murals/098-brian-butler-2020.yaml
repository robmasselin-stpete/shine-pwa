artistBio: |
  Brian Butler runs Upper Hand Art out of Miami, working across murals,
  illustration, gigposters, and live concert drawing. His "Show Drawn"
  series documents over 2,000 live performances sketched on-site at
  venues across the country. He's done album art for GZA, murals for
  Target and LAFC, and painted at POW!WOW! festivals in Worcester and
  Hawaii.

  His 2020 SHINE mural wraps the MUV Dispensary building in a sprawling
  nature scene — dense vegetation, birds, and flowing organic linework
  that turns the commercial facade into something closer to a botanical
  garden wall. The bold outlines and hand-illustrated feel are
  distinctly Butler.

muralDescription: |
  A large-scale nature scene wraps the MUV Dispensary building, featuring
  dense tropical foliage, birds in flight, and flowing organic linework.
  The composition covers multiple faces of the building, creating an
  immersive green canopy effect. Bold outlines define the plant forms
  while softer color fills give the whole piece a hand-illustrated,
  almost storybook quality.

