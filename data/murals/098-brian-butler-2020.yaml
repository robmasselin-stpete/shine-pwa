artistBio: |
  Brian Butler is a Miami based artist, who's life has been guided by music for
  multiple decades. He has serviced musicians and festivals across nearly every
  genre imaginable with custom branding, murals, merchandise and album artwork.
  His move to Miami was hinged entirely on once catching a really good Iggy Pop
  concert. From 2010 until the death of live music in 2020, he could be found
  in venues across the country illustrating concerts. His collection of Show
  Drawn concert sketches exceeds 2000 performances, and has been exhibited
  nationally with Superchief Gallery, Subliminal Projects, and Simmons
  University's Trustman Gallery.

