artistBio: |
  Julien Brouand, known as Abys, is a self-taught French artist from Nancy,
  born in 1991. Passionate about drawing and cartoons from a young age, he
  discovered graffiti in 2009. After years practicing with various
  collectives, he developed his own character-driven style in 2015 —
  staging lively, narrative, and colorful compositions mixing whimsical
  characters, decorations, and lettering. For the 2024 SHINE festival, he
  painted this six-story gator in just four days and had enough time and
  paint left over to create a bonus crab mural on the back of Anchor Skate
  Supply nearby.

muralDescription: |
  A six-story-tall mural on the side of the Modera apartment building
  depicting a cartoonish, pot-bellied alligator with a mischievous grin,
  riding a red surfboard through splashing turquoise waves. A pink hibiscus
  flower sits atop the gator's head, and teal smoke curls above. The
  surfboard reads "SHINE" in stylized lettering. At the base, a triangular
  logo anchors the composition. The character's exaggerated features and
  vibrant green-on-gray color scheme make it visible from blocks away.

