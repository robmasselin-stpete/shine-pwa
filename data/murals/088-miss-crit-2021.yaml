artistBio: |
  Miss Crit, aka Laura Spencer, is an Illustrator born and raised in St.
  Petersburg, FL. With a style that is a little bit spooky and a little bit
  psychedelic, Miss Crit designs with her third-eye wide open. She brings
  together traditional fine art techniques, narrative storytelling devices, and
  digital design technology to craft quaint and quirky illustrations. From
  drawings, paintings, and murals to interactive installations and
  collaborations, Miss Crit aims to entrance and transform her audience—and
  through their experience, they become the narrators of their own stories.

