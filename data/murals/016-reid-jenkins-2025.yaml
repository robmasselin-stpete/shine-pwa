artistBio: |
  Reid Jenkins is a St. Petersburg native who holds a BFA from Maryland
  Institute College of Art and is a graduate of the P.C.C.A program at Gibbs
  High School. His work spans murals, canvas paintings, and tattoos — he
  currently tattoos at Fabled Trade Tattoo Company in Lealman and maintains
  a studio at the Arts Exchange in the Warehouse Arts District. Jenkins aims
  to paint the human experience and capture the small moments that many
  forget to appreciate. He painted a SHINE mural in 2021 and returned for
  SHINE Origins 2025 with this botanical piece at Founders Pro.

muralDescription: |
  A stunning photorealistic botanical mural on the side of a commercial
  building against a deep black background. An overflowing arrangement of
  tropical flowers fills the wall — king proteas, red ginger, heliconia,
  pincushion proteas, orchids, and ferns rendered in rich crimsons, pinks,
  corals, golds, and greens. The hyperrealistic detail and dramatic dark
  background give it the feel of a Dutch Golden Age still life painting
  scaled up to building size.

