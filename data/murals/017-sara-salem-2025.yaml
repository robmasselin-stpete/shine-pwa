artistBio: |
  Sara Salem is a St. Petersburg-based mural artist and co-founder of Phi Phi
  Artland, a creative arts center blending fine art, wellness, and community.
  She holds a BFA (2011) and brings over 12 years of teaching experience
  spanning Africa, Asia, and the USA. Beyond murals, Salem is a yoga
  instructor, Reiki Level II practitioner, and certified art therapist who
  co-founded Milky Way Retreats. For the 2025 SHINE Origins festival, she
  led a community mural project at LMCU Bank, inviting local residents to
  help paint alongside her — one of the festival's signature collaborative
  highlights.

muralDescription: |
  A large mural on the side of a building featuring a colorful pelican
  wearing a white baseball cap and reflective sunglasses that show St. Pete
  landmarks in their lenses. The pelican's wings are spread wide in vibrant
  pinks, oranges, blues, and deep reds. A golden spiral sun radiates in the
  upper left corner, and "We Are St. Pete" appears in playful navy blue
  script to the right. Signed "Phi Phi Artland @Sarasalemartsy" at the
  bottom. The white background keeps the whole piece bright and inviting.

