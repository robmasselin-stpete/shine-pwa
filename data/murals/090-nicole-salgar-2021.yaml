artistBio: |
  Nicole Salgar is a multi-media visual artist from Miami, FL. Influenced by
  her Latin roots and passion for horror, sci-fi and folk art, Nicole has
  traveled to Cuba, Europe, South America and along the east coast
  collaborating on mural projects with local communities. Often using muralism
  as a meditative and healing practice, she invites viewers to challenge their
  perspectives and assumptions which may arise from her ambiguous motifs.
  Nicole finds that experimentation is the key to creation and without it,
  nothing truly effective has the chance to reveal itself. Through her creative
  business NS/CB, she’s worked with a variety of clients including Starbucks,
  Tanqueray, Lulu Lemon, Steven Madden and Bacardi.

