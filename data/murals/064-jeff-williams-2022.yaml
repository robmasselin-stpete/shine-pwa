artistBio: |
  Jeff Williams is a St. Petersburg native who runs Sun Signs, a
  traditional sign painting shop in the city. His work is steeped in
  mid-century design — hand-drawn letterforms, 1950s advertising
  aesthetics, and vintage tattoo flash — and he's painted the sign for
  Sunken Gardens, one of Florida's oldest roadside attractions. He's
  been featured on PBS WEDU's Arts Plus.

  His SHINE 2022 mural at Myoblast Strength is a love letter to old
  Florida tourism — stacked horizontal bands reading "Florida Souvenirs,"
  "St. Petersburg," "the sun... the sea... you & me," "Tampa Bay," and
  "Sunshine 360 Days a Year," all painted in vintage postcard style with
  retro illustrations. It looks like it could have been on a highway
  billboard in 1955.

muralDescription: |
  A tall wall painted as a stack of vintage Florida tourism signs in
  bold primary colors. From top to bottom: "Florida SOUVENIRS" with palm
  trees, "ST. PETERSBURG" in large white block letters on black,
  "the sun... the sea... you & me — THE SUNSHINE CITY" on red with
  pin-up illustrations and oranges, "FLORIDA" in classic postcard
  lettering, "Tampa Bay" in red script with a pelican mascot, and
  "Sunshine 360 Days A Year" with a retro couple in green. Every detail
  is hand-painted in authentic mid-century sign style.

