artistBio: |
  Jeff Williams is a traditional sign painter who was born and raised in St.
  Petersburg, FL. An early exposure to mid century design via his parents’
  vintage shop had a lasting impact and is still prevalent in his work today.
  Most of his work is influenced by old hand drawn and painted letter forms,
  mid century style illustrations, ‘50s advertising and packaging, as well as
  vintage tattoo flash. His aim is to preserve the rich visual identity of our
  city through traditional hand painted signage.

