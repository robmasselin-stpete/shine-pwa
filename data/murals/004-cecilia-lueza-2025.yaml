artistBio: |
  Cecilia Lueza is an Argentine American artist and sculptor who studied fine
  arts at the University of La Plata in Buenos Aires. After moving to
  St. Petersburg over two decades ago, she became known for vibrant public art
  spanning murals, monumental sculptures, painted rooftops, and even street
  intersections. Her geometric, nature-inspired style has been shown in
  galleries throughout the US, South America, Spain, and France. A SHINE
  veteran, Lueza painted "Common Ground" — an entire intersection — for
  SHINE 2016, "The Blue Hour" for SHINE 2018, and returned again for SHINE
  2019 and 2025 Origins.

muralDescription: |
  A large-scale mural on the side of a commercial building depicting a
  vividly colored hummingbird in flight, wings spread wide, rendered in
  iridescent greens, blues, and oranges. The bird hovers against a dynamic
  background of overlapping translucent circles in gradients of blue, teal,
  green, and yellow — Lueza's signature geometric style. Signed "LUEZA" in
  the upper right. The building number 255 is visible at the left edge.

