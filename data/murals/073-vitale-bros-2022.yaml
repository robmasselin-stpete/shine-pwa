artistBio: |
  The Vitale Brothers — Johnny and Paul — are a St. Petersburg muralist
  duo who've been part of the local art scene for years. They're known
  for large-scale character paintings with a playful, pop-culture-heavy
  approach that makes their walls some of the most photographed in the
  city.

  Their 2022 SHINE piece at Parc features a lineup of cartoon characters
  rendered in the Vitales' bold, graphic style, turning the building wall
  into a crowd-pleasing photo spot.

muralDescription: |
  A row of SpongeBob SquarePants characters fills the wall in the Vitale
  Brothers' bold, graphic mural style. The familiar cartoon figures are
  painted at building scale with clean outlines and flat, saturated colors
  that pop against the building exterior. It's become one of the more
  popular photo-op walls in the area.

