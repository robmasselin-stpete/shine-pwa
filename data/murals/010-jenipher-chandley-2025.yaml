artistBio: |
  Jenipher Chandley is a St. Petersburg-based representational artist whose
  work explores the relationship between nature and the human condition,
  focusing on themes of strength, beauty, loss, and resilience. Working
  predominantly with oils, she creates figurative artwork infused with
  surrealism and symbolism. She holds degrees in Interior and Graphic Design
  and has shown her work in hundreds of shows and charitable events while
  curating exhibitions throughout Tampa Bay. A 2023 Creative Pinellas
  Emerging Artist grantee, she has also been selected as the Local Artist
  Spotlight by the Gasparilla Festival of the Arts and featured by American
  Stage Theater. She participated in SHINE 2021 and returned for SHINE
  Origins 2025.

muralDescription: |
  A wide mural on a cinder block wall with the words "Stronger Together" in
  large flowing white script across a deep teal background. The text is
  framed by a lush border of curling green vines and tropical flame-colored
  flowers — gloriosa lilies in reds, oranges, and yellows. Signed "Jenipher
  Chandley" in the upper right corner.

