artistBio: |
  Born in NY, from Haitian descent, Mwanel Pierre-Louis is an artist based out
  of Miami, FL. His work combines realism and abstraction in a narrative that
  draws from personal interactions and pop references. Mwanel's paintings
  feature juxtapositions of fragmented experiences and a strong emphasis on the
  relationship between subject and color. His work has been exhibited across
  the country with his first solo show in 2019 at Thinkspace Gallery and his
  clients include Starbucks, Fader Magazine, Adidas, and Atlantic Records.

