artistBio: |
  Mwanel Pierre-Louis is a Miami-based painter born in New York to
  Haitian parents. He studied at New World School of the Arts in Miami
  and the Art Center College of Design in Pasadena, and has since built a
  client roster that includes Adidas, Jack Daniel's, Foot Locker, Puma,
  the Miami Dolphins, and the Florida Panthers. His paintings have shown
  at Scope Art Fair during Art Basel and at POW!WOW! Hawaii.

  His 2021 SHINE portrait on the side of Green Bench Brewing features a
  woman with flowing locs against layered washes of warm color. The piece
  shows his signature approach — photorealistic faces dissolving into
  loose, expressive abstraction around the edges.

muralDescription: |
  A striking portrait of a woman with long locs dominates the side of
  Green Bench Brewing. The face is rendered with photorealistic detail
  while the background dissolves into expressive washes of warm oranges,
  reds, and earth tones. The contrast between the precise portrait work
  and the loose, painterly surroundings gives the piece real presence
  from across the street.

